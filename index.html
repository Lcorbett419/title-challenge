        const calculatePlayerValue = (player, asOfDate, leagueTier) => {
          const { positions, rating, dob } = player;
          const pv = { 'ST':1.0,'LW':0.95,'RW':0.95,'CAM':0.85,'CM':0.70,'CDM':0.68,'LB':0.65,'RB':0.65,'CB':0.60,'GK':0.55 };
          const mx = Math.max(...positions.map(p => pv[p]||0.5));
          const bd = new Date(dob), cd = asOfDate||new Date();
          let age = cd.getFullYear()-bd.getFullYear();
          if(cd.getMonth()-bd.getMonth()<0||(cd.getMonth()===bd.getMonth()&&cd.getDate()<bd.getDate())) age--;
          let am; if(age>=21&&age<=29) am=1.0; else if(age<21) am=rating>=14?0.6+(age-16)*0.08+(rating-14)*0.05:0.4+(age-16)*0.12; else am=Math.max(0.2,1.0-((age-29)*0.08));
        
          // League tier multiplier: tier 0 (top) = 1.0, tier 1 = 0.6, tier 2 = 0.35, tier 3 = 0.2
          const tierMultipliers = [1.0, 0.6, 0.35, 0.2];
          const tm = tierMultipliers[leagueTier !== undefined ? Math.min(leagueTier, 3) : 0];
        
          return Math.min(Math.round(Math.pow(rating,2)*mx*am*tm*250000),100000000);
        };

            italy: ['italy', 'italy_serieb']

          for (const [, pyramid] of Object.entries(pyramids)) {
            const idx = pyramid.indexOf(leagueKey);
            if (idx !== -1) return idx;
          }
          return 0;

         const generateTransferList = () => {
          const available = [];
          Object.keys(leagues).forEach(lk => {
            leagues[lk].teams.forEach(tm => {
              if (tm.id === team.id) return;
              tm.players.forEach(p => {
                if (Math.random() < 0.3) {
                  available.push({ player: p, team: tm, leagueKey: lk, askingPrice: Math.round(calculatePlayerValue(p, date, getLeagueTier(lk)) * (1.1 + Math.random() * 0.4))});
                }
              });
            });
          });
          available.sort((a, b) => b.player.rating - a.player.rating);
          setTransferList(available);
        };
        
          const buyPlayer = (listing) => {
          if (team.budget < listing.askingPrice) { alert('Insufficient funds!'); return; }
          if (team.players.length >= 30) { alert('Squad is full! (max 30) Sell a player first.'); return; }
          setState('negotiation');    
        
          // Start negotiation screen
          setTransferNegotiation({
            type: 'buy',
            player: listing.player,
            fromTeam: listing.team,
            price: listing.askingPrice,
            stage: 'bidding', // bidding -> negotiating -> result
            result: null,
            message: ''
          });
        
          // Simulate negotiation after a moment
          setTimeout(() => {
            setTransferNegotiation(prev => {
              if (!prev) return null;
              return { ...prev, stage: 'negotiating', message: `${listing.team.name} have accepted your bid.` };
            });
        
            setTimeout(() => {
              // Player decision based on team strength comparison
              const myStrength = getTeamStrength(team);
              const theirStrength = getTeamStrength(listing.team);
              const playerRating = listing.player.rating;
              const strengthDiff = myStrength - theirStrength;
        
              // Base acceptance chance
              let acceptChance = 0.5;
        
              // Better team = more likely to accept
              acceptChance += strengthDiff * 0.15;
        
              // Star players (high rating) are harder to convince for a step down
              if (playerRating >= 17 && strengthDiff < 0) acceptChance -= 0.3;
              if (playerRating >= 15 && strengthDiff < -1) acceptChance -= 0.2;
        
              // Players from weaker teams are easier to sign
              if (strengthDiff > 2) acceptChance += 0.3;
        
              // Clamp between 5% and 95%
              acceptChance = Math.max(0.05, Math.min(0.95, acceptChance));
        
              const accepted = Math.random() < acceptChance;
        
              setTransferNegotiation(prev => {
                if (!prev) return null;
                return {
                  ...prev,
                  stage: 'result',
                  result: accepted,
                  message: accepted
                    ? `${listing.player.name} has agreed to join your club!`
                    : `${listing.player.name} has rejected your offer. The player prefers to stay at ${listing.team.name}.`
                };
              });
            }, 1500);
          }, 1000);
        };

          team.budget -= price;
          fromTeam.players = fromTeam.players.filter(p => p.id !== player.id);
          const maxId = Math.max(...team.players.map(p => p.id), 0);
          const newPlayer = { ...player, id: maxId + 1, goals: 0, injured: false, injuryUntil: null };

                    <div className="fixed inset-0 bg-black/90 z-50 flex flex-col">
                      {/* Score header */}
                      <div className="p-3 text-center" style={{ background: team.primaryColor || '#ea580c' }}>
                        <p className="text-white font-bold text-lg">
                          {isHalfTime ? 'Half Time' : 'Tactics'} — {liveScore.home} – {liveScore.away}
                        </p>
                        <p className="text-white/70 text-xs">{liveMinute}th minute</p>
                      </div>

                        {tacticsReason && (
                          <div className={`px-4 py-3 text-center ${tacticsReason.type === 'injury' ? 'bg-red-900/80 border-b border-red-500/50' : 'bg-red-700/80 border-b border-red-400/50'}`}>
                            <p className="text-white font-bold text-sm">
                              {tacticsReason.type === 'injury' ? '⚕️ INJURY' : '🟥 RED CARD'}
                            </p>
                            <p className="text-white text-lg font-bold">{tacticsReason.playerName}</p>
                            <p className="text-red-200 text-xs mt-1">
                              {tacticsReason.type === 'injury' ? 'You should substitute this player' : 'This player has been sent off and cannot be replaced'}
                            </p>
                          </div>
                        )}
                        
                      {/* Match info bar */}
                      <div className="bg-green-900/80 px-3 py-2 text-center">
                        <p className="text-green-300 text-xs font-semibold">
                          Subs: {matchSubs.made}/{matchSubs.max} used
                          {team.players.filter(p => p.injured && Object.values(startingXI).includes(p.id)).length > 0 &&
                            <span className="text-red-400 ml-2">⚠️ Injured players in XI!</span>
                          }
                        </p>
                      </div>
                
                      {/* Formation selector */}
                      <div className="bg-gray-800 p-2 flex gap-2 justify-center border-b border-gray-700">
                        {Object.keys(presetFormations).map(f => (
                          <button key={f} onClick={() => {
                            const newPositions = presetFormations[f];
                            const currentPlayerIds = lineup.map(s => s.playerId);
                            const newLin = newPositions.map((pos, idx) => {
                              return { playerId: currentPlayerIds[idx] || currentPlayerIds[0], position: pos };
                            });
                            setLineup(newLin);
                            setStartingXI(lineupToStartingXI(newLin));
                          }} className={`px-3 py-1.5 rounded text-xs font-bold bg-gray-700 text-gray-400 hover:bg-gray-600`}>{f}</button>
                        ))}
                      </div>
                
                      {/* Pitch with shirts */}
                      <div className="flex-1 overflow-y-auto">
                        <div className="relative w-full" style={{ paddingBottom: '140%', background: 'linear-gradient(180deg, #2d5a1e 0%, #357a24 8%, #2d5a1e 16%, #357a24 24%, #2d5a1e 32%, #357a24 40%, #2d5a1e 48%, #357a24 56%, #2d5a1e 64%, #357a24 72%, #2d5a1e 80%, #357a24 88%, #2d5a1e 100%)' }}>
                          <div className="absolute inset-0">
                            <svg viewBox="0 0 100 140" className="absolute inset-0 w-full h-full">
                              <rect x="2" y="2" width="96" height="136" fill="none" stroke="rgba(255,255,255,0.2)" strokeWidth="0.4" />
                              <line x1="2" y1="70" x2="98" y2="70" stroke="rgba(255,255,255,0.2)" strokeWidth="0.3" />
                              <circle cx="50" cy="70" r="10" fill="none" stroke="rgba(255,255,255,0.2)" strokeWidth="0.3" />
                              <circle cx="50" cy="70" r="0.6" fill="rgba(255,255,255,0.2)" />
                              <rect x="25" y="2" width="50" height="18" fill="none" stroke="rgba(255,255,255,0.2)" strokeWidth="0.3" />
                              <rect x="35" y="2" width="30" height="7" fill="none" stroke="rgba(255,255,255,0.2)" strokeWidth="0.3" />
                              <rect x="25" y="120" width="50" height="18" fill="none" stroke="rgba(255,255,255,0.2)" strokeWidth="0.3" />
                              <rect x="35" y="131" width="30" height="7" fill="none" stroke="rgba(255,255,255,0.2)" strokeWidth="0.3" />
                              <path d="M 35 20 A 12 12 0 0 0 65 20" fill="none" stroke="rgba(255,255,255,0.2)" strokeWidth="0.3" />
                              <path d="M 35 120 A 12 12 0 0 1 65 120" fill="none" stroke="rgba(255,255,255,0.2)" strokeWidth="0.3" />
                            </svg>
                
                            {lineup.map((slot, idx) => {
                              const pos = allPositions[slot.position] || { x: 50, y: 50 };
                              const playerId = startingXI[`pos${idx}`];
                              const player = playerId ? team.players.find(p => p.id === playerId) : null;
                              const requiredPos = lineup[idx]?.position || 'CM';
                              const isGK = requiredPos === 'GK';
                              const isInjured = player && player.injured;
                              const isSentOff = player && sentOffPlayers.includes(player.id);
                              const isOOP = player && !isPlayerInPosition(player, lineup[idx]?.position || 'CM');
                              const isSelected = selectedSlot === idx;
                              const surname = player ? player.name.split(' ').pop() : requiredPos;
                
                              // Get match rating if available
                              const allMP = [...(liveMatch.homePlayers || []), ...(liveMatch.awayPlayers || [])];
                              const mp = player ? allMP.find(m => m.id === player.id) : null;
                              const rating = mp ? mp.matchRating.toFixed(0) : player ? player.rating : '?';
                
                              return (
                                <div key={idx} 
                                    
                                  onClick={() => {
                                  // Sent off slots: allow position swaps with other pitch players, but block subs
                                  if (isSentOff) {
                                    if (selectedSlot !== null && selectedSlot !== idx) {
                                      // Swap positions with another on-pitch player (free)
                                      const xi = { ...startingXI };
                                      const temp = xi[`pos${selectedSlot}`];
                                      xi[`pos${selectedSlot}`] = xi[`pos${idx}`];
                                      xi[`pos${idx}`] = temp;
                                      setStartingXI(xi);
                                      setSelectedSlot(null);
                                      setSelectedBenchPlayer(null);
                                    }
                                    return;
                                  }
                                  // Block subbing a bench player into a sent-off slot
                                  if (selectedBenchPlayer) {
                                    const currentOccupant = startingXI[`pos${idx}`];
                                    if (currentOccupant && sentOffPlayers.includes(currentOccupant)) {
                                      return;
                                    }
                                }
                                      
                                  // If a bench player is already selected, sub them in (costs a sub)
                                  if (selectedBenchPlayer && matchSubs.made < matchSubs.max) {
                                    const xi = { ...startingXI };
                                    xi[`pos${idx}`] = selectedBenchPlayer;
                                    setStartingXI(xi);
                                    setMatchSubs(prev => ({ ...prev, made: prev.made + 1 }));
                                    setSelectedBenchPlayer(null);
                                    setSelectedSlot(null);
                                    const removedId = startingXI[`pos${idx}`];
                                    if (removedId) setSubbedOffPlayers(prev => [...prev, removedId]);  
                                  }
                                  else if (selectedSlot !== null && selectedSlot !== idx) {
                                    // Swap two on-pitch players (free — no sub used)
                                    const xi = { ...startingXI };
                                    const temp = xi[`pos${selectedSlot}`];
                                    xi[`pos${selectedSlot}`] = xi[`pos${idx}`];
                                    xi[`pos${idx}`] = temp;
                                    setStartingXI(xi);
                                    setSelectedSlot(null);
                                    setSelectedBenchPlayer(null);
                                  } else {
                                    setSelectedSlot(isSelected ? null : idx);
                                    setSelectedBenchPlayer(null);
                                  }
                                }}
                                    
                                  className="absolute flex flex-col items-center cursor-pointer"
                                  style={{ left: `${pos.x}%`, top: `${pos.y / 140 * 100}%`, transform: 'translate(-50%, -50%)', zIndex: isSelected ? 20 : 10, width: '18%' }}>
                                  <div className={`relative transition-transform ${isSelected ? 'scale-125' : ''}`} style={{ width: '42px', height: '38px' }}>
                                    <ShirtSvg number={player ? player.rating : '?'} isGK={isGK} isOOP={(isOOP || isInjured) && !!player} />
                                    {isSelected && <div className="absolute inset-0 rounded" style={{ boxShadow: '0 0 15px rgba(249,115,22,0.9)' }}></div>}
                                    {isInjured && !isSentOff && <div className="absolute -top-1 -right-1 text-xs">🚑</div>}
                                    {isSentOff && <div className="absolute -top-1 -right-1 text-xs">🟥</div>}
                                  </div>
                                    <div className={`text-center font-bold leading-tight mt-0.5 ${isSentOff ? 'text-red-500 line-through' : 'text-white'}`} style={{ fontSize: '8px', textShadow: '0 1px 3px rgba(0,0,0,0.9)' }}>{isSentOff ? 'OFF' : surname}</div>                                  <div className="text-gray-300 text-center leading-tight" style={{ fontSize: '7px', textShadow: '0 1px 2px rgba(0,0,0,0.8)' }}>
                                    {player ? `${player.positions.join(' ')} (${rating})` : ''}
                                  </div>
                                  {isOOP && !isInjured && !isSentOff && <div style={{ fontSize: '8px' }} className="text-yellow-400">⚠️</div>}
                                </div>
                              );
                            })}
                          </div>
                        </div>
                
                        {/* Bench section below pitch */}
                       {(selectedSlot !== null || selectedBenchPlayer !== null) && (
                          <div className="bg-orange-900/40 px-3 py-2 text-center">
                            <p className="text-orange-300 text-xs font-semibold">
                              {selectedSlot !== null
                                ? 'Tap another shirt to swap positions, or a bench player to substitute'
                                : `Tap a position on the pitch to place ${team.players.find(p => p.id === selectedBenchPlayer)?.name || 'player'}`
                              }
                            </p>
                          </div>
                        )}
                
                        <div className="bg-gray-800 p-3 pb-24">
                          <h3 className="text-white font-bold text-sm mb-2">Substitutes</h3>
                          <div className="space-y-1">
                            {benchPlayers.map(p => {
                              const slotPos = selectedSlot !== null ? lineup[selectedSlot]?.position : null;
                              const validPos = slotPos ? (positionMapping[slotPos] || []) : [];
                              const fits = selectedSlot !== null && p.positions.some(pp => validPos.includes(pp));
                              return (
                                <div key={p.id}
                              onClick={() => {
                              if (selectedSlot !== null && matchSubs.made < matchSubs.max) {
                                // Slot already selected — place this player there
                                const xi = { ...startingXI };
                                xi[`pos${selectedSlot}`] = p.id;
                                setStartingXI(xi);
                                setMatchSubs(prev => ({ ...prev, made: prev.made + 1 }));
                                setSelectedSlot(null);
                                setSelectedBenchPlayer(null);
                                const removedId = startingXI[`pos${selectedSlot}`];
                                if (removedId) setSubbedOffPlayers(prev => [...prev, removedId]);  
                              } 
                              else if (selectedSlot !== null) {
                                alert('No substitutions remaining!');
                              } else {
                                // No slot selected — select this bench player first
                                setSelectedBenchPlayer(selectedBenchPlayer === p.id ? null : p.id);
                                setSelectedSlot(null);
                              }
                            }}
                                  className={`rounded p-2 flex items-center gap-3 cursor-pointer transition-all ${selectedBenchPlayer === p.id ? 'bg-orange-900/40 ring-2 ring-orange-500' : selectedSlot !== null ? fits ? 'bg-green-900/40 ring-1 ring-green-500' : 'bg-gray-800 hover:bg-gray-700' : 'bg-gray-800 hover:bg-gray-700'}`}>
                                    <div style={{ width: '32px', height: '28px', flexShrink: 0 }}>
                                    <ShirtSvg number={p.rating} isGK={p.positions.includes('GK')} isOOP={false} />
                                  </div>
                                  <div className="flex-1 min-w-0">
                                    <div className="text-white font-semibold text-sm truncate">{p.name}</div>
                                    <div className="text-gray-400 text-xs">{p.positions.join('/')} • Age {calcAge(p.dob)}</div>
                                  </div>
                                  {selectedSlot !== null && fits && <span className="text-green-400 text-xs font-bold">✓</span>}
                                </div>
                              );
                            })}
                            {benchPlayers.length === 0 && <p className="text-gray-500 text-sm">No available substitutes</p>}
                          </div>
                        </div>
                      </div>
                
                      {/* Resume button */}
                      <div className="fixed bottom-0 left-0 right-0 p-4 bg-gray-900 z-50">
                        <button onClick={() => {
                          setSelectedSlot(null);
                          setTacticsReason(null);
                          if (isHalfTime) { setIsHalfTime(false); }
                          if (tacticsPaused) { setTacticsPaused(false); }
                          resumeFromTactics();
                        }} 
                            className="w-full bg-green-600 text-white py-4 rounded-lg font-bold text-lg">
                          {isHalfTime ? 'Start Second Half →' : 'Resume Match →'}
                        </button>
                      </div>
                    </div>
                  );
                })()}
        
              {/* Continue button - only when finished */}
              {isFinished && (
              <div className="fixed bottom-0 left-0 right-0 p-4 bg-gray-900 z-50">
                <button onClick={finishLiveMatch} className="w-full bg-green-600 text-white py-4 rounded-lg font-bold text-lg">Continue</button>
              </div>
            )}
        
              {/* Live indicator */}
              {!isFinished && !isHalfTime && !tacticsPaused && (
              <div className="fixed bottom-0 left-0 right-0 p-4 bg-gray-900 z-40 flex items-center justify-between">
                <div className="flex items-center gap-2">
                  <div className="w-2 h-2 bg-red-500 rounded-full animate-pulse"></div>
                  <p className="text-gray-400 text-sm">LIVE — {matchHalf === 1 ? '1st Half' : '2nd Half'}</p>
                </div>
                <button onClick={pauseForTactics}
                  disabled={matchSubs.made >= matchSubs.max}
                  className={`px-4 py-2 rounded-lg font-bold text-sm ${matchSubs.made < matchSubs.max ? 'bg-orange-600 text-white' : 'bg-gray-700 text-gray-500 cursor-not-allowed'}`}>
                  📋 Tactics ({matchSubs.max - matchSubs.made} subs)
                </button>
              </div>
            )}
            </div>
          );
        }

            if (state === 'playoffs' && playoffState) {
              return (
                <div className="min-h-screen bg-gray-900 flex flex-col">
                  <div className="p-4 text-center" style={{ background: 'linear-gradient(180deg, #1a3a1a 0%, #0a1a0a 100%)' }}>
                    <p className="text-yellow-400 font-bold text-2xl" style={{ fontFamily: 'monospace' }}>PLAYOFFS</p>
                    <p className="text-yellow-600 text-sm">{leagues[playoffState.leagueKey].name}</p>
                  </div>
            
                  <div className="flex-1 overflow-y-auto p-4 pb-24">
                    {playoffState.results.map((r, i) => (
                      <div key={i} className={`bg-gray-800 rounded-lg p-4 mb-3 ${r.round === 'FINAL' ? 'ring-2 ring-yellow-500' : ''}`}>
                        <p className={`text-xs font-bold mb-2 ${r.round === 'FINAL' ? 'text-yellow-400' : 'text-gray-500'}`}>{r.round}</p>
            
                        {r.leg1 ? (
                          <>
                            <div className="flex justify-between items-center mb-1">
                              <span className="text-white text-sm">{r.leg1.home}</span>
                              <span className="text-white font-bold">{r.leg1.homeScore} - {r.leg1.awayScore}</span>
                              <span className="text-white text-sm">{r.leg1.away}</span>
                            </div>
                            <div className="flex justify-between items-center mb-2">
                              <span className="text-white text-sm">{r.leg2.home}</span>
                              <span className="text-white font-bold">{r.leg2.homeScore} - {r.leg2.awayScore}</span>
                              <span className="text-white text-sm">{r.leg2.away}</span>
                            </div>
                            <div className="text-center">
                              <span className="text-gray-400 text-xs">Agg: {r.agg[0]} - {r.agg[1]}</span>
                              <p className="text-green-400 font-bold text-sm mt-1">✓ {r.winner.name} advance</p>
                            </div>
                          </>
                        ) : (
                          <>
                            <div className="flex justify-between items-center mb-2">
                              <div className="flex items-center gap-2">
                                <div className="flex-shrink-0">{renderShirt(r.team1, '30px')}</div>
                                <span className="text-white text-sm">{r.result.home}</span>
                              </div>
                              <span className="text-white font-bold text-lg">{r.result.homeScore} - {r.result.awayScore}</span>
                              <div className="flex items-center gap-2">
                                <span className="text-white text-sm">{r.result.away}</span>
                                <div className="flex-shrink-0">{renderShirt(r.team2, '30px')}</div>
                              </div>
                            </div>
                            <p className={`text-center font-bold text-sm ${r.round === 'FINAL' ? 'text-yellow-400' : 'text-green-400'}`}>
                              {r.round === 'FINAL' ? '🏆 ' : '✓ '}{r.winner.name} {r.round === 'FINAL' ? 'PROMOTED!' : 'advance'}
                            </p>
                          </>
                        )}
                      </div>
                    ))}
            
                    <div className={`bg-gray-800 rounded-lg p-6 text-center ${playoffState.promotedTeam.id === team.id ? 'ring-2 ring-green-500' : 'ring-2 ring-red-500'}`}>
                      <p className="text-3xl mb-2">{playoffState.promotedTeam.id === team.id ? '🎉' : '😢'}</p>
                      <p className="text-white font-bold text-xl">{playoffState.message}</p>
                    </div>
                  </div>
            
                  <div className="fixed bottom-0 left-0 right-0 p-4 bg-gray-900 z-50">
                    <button onClick={() => {
                      const promoted = {};
                      promoted[playoffState.leagueKey] = playoffState.promotedTeam.id;
                      completeSeasonTransition(promoted);
                    }} className="w-full bg-green-600 text-white py-4 rounded-lg font-bold text-lg">Continue to Next Season</button>
                  </div>
                </div>
              );
            }

            if (state === 'post-match') {
              const isHome = match?.home;
              const won = match?.ps > match?.os;
              const drew = match?.ps === match?.os;
              const lost = match?.ps < match?.os;
              const resultText = won ? 'Victory' : drew ? 'Draw' : 'Defeat';
              const resultColor = won ? 'text-green-400' : drew ? 'text-yellow-400' : 'text-red-400';
            
              return (
                <div className="min-h-screen bg-gray-900 flex flex-col">
                  {/* Header */}
                  <div className="p-4 text-center" style={{ background: team.primaryColor || '#ea580c' }}>
                    <p className="text-white font-bold text-lg">Squad News</p>
                    <p className="text-white/70 text-sm">{formatDate(date)}</p>
                  </div>
            
                  {/* Match result summary */}
                  <div className="bg-gray-800 p-4 text-center border-b border-gray-700">
                    <p className={`font-bold text-2xl ${resultColor}`}>{resultText}</p>
                    <p className="text-white text-lg">
                      {match?.home ? team.name : match?.opp} {match?.home ? match?.ps : match?.os} - {match?.home ? match?.os : match?.ps} {match?.home ? match?.opp : team.name}
                    </p>
                  </div>
            
                  {/* News items */}
                  <div className="flex-1 overflow-y-auto pb-24" style={{ background: 'linear-gradient(180deg, #2d4a2d 0%, #1a3a1a 100%)' }}>
                    {postMatchNews.length > 0 ? (
                      <div className="p-4 space-y-3">
                        {postMatchNews.map((item, i) => (
                          <div key={i} className="flex items-start gap-3 bg-gray-800/60 rounded-lg p-4">
                            <div className={`${item.color} rounded-lg w-12 h-12 flex items-center justify-center flex-shrink-0`}>
                              <span className="text-2xl">{item.icon}</span>
                            </div>
                            <div className="flex-1">
                              <p className="text-gray-400 text-sm">{item.title}</p>
                              <p className="text-white font-bold text-lg">{item.playerName}</p>
                              <p className={`text-sm ${
                                item.type === 'injury' ? 'text-gray-500' :
                                item.type === 'suspension' ? 'text-red-400' :
                                item.type === 'available' ? 'text-blue-400' :
                                item.type === 'development' ? 'text-orange-400' :
                                item.type === 'decline' ? 'text-orange-700' :
                                item.type === 'rest' ? 'text-amber-400' :
                                'text-gray-400'
                              }`}>{item.detail}</p>
                            </div>
                          </div>
                        ))}
                      </div>
                    ) : (
                      <div className="p-8 text-center">
                        <p className="text-4xl mb-3">✅</p>
                        <p className="text-white font-bold text-lg">No Squad News</p>
                        <p className="text-gray-400 text-sm">All players fit and available</p>
                      </div>
                    )}
                  </div>
            
                  {/* Continue button */}
                  <div className="fixed bottom-0 left-0 right-0 p-4 bg-gray-900 z-50">
                    <button onClick={() => { setPage('home'); setState('info-page'); }} className="w-full bg-green-600 text-white py-4 rounded-lg font-bold text-lg">Continue</button>
                  </div>
                </div>
              );
            }
            
          if (state === 'formation') {
            const next = getNext();
            const opp = next ? (next.homeTeamId === team.id ? leagues[league].teams.find(t => t.id === next.awayTeamId) : leagues[league].teams.find(t => t.id === next.homeTeamId)) : null;
            const inj = team.players.filter(p => p.injured);
            const validPlayers = Object.values(startingXI).filter(pid => {
              const p = team.players.find(pl => pl.id === pid);
              return p && !p.injured;
            });
            const selectedCount = validPlayers.length;
            const validXI = selectedCount === 11;

            return (
              <div className="min-h-screen bg-gray-900 p-4">
                <div className="max-w-2xl mx-auto">
                  <button onClick={() => { setPage('home'); setState('info-page'); }} className="text-gray-400 mb-4 hover:text-white">← Back</button>
                  <h1 className="text-white font-bold text-2xl mb-4">Pre-Match Setup</h1>
                  <div className="bg-gray-800 rounded-lg p-4 mb-4">
                    <p className="text-white">{team.name} vs {opp?.name}</p>
                    <p className="text-gray-400 text-sm">{next?.homeTeamId === team.id ? 'Home' : 'Away'}</p>
                  </div>
                  {inj.length > 0 && (
                    <div className="bg-red-900/20 rounded-lg p-4 mb-4">
                      <h3 className="text-red-400 font-bold mb-2">⚕️ Injured Players</h3>
                      {inj.map(p => {
                        const w = getWeeksUntil(p.injuryUntil);
                        return <p key={p.id} className="text-red-300 text-sm">{p.name} - {w > 0 ? `${w} week${w > 1 ? 's' : ''} remaining` : 'Returning soon'}</p>;
                      })}
                    </div>
                  )}
                    
                    {(() => {
                      const sus = team.players.filter(p => p.suspended);
                      if (sus.length === 0) return null;
                      return (
                        <div className="bg-red-900/30 rounded-lg p-4 mb-4">
                          <h3 className="text-red-400 font-bold mb-2">🟥 Suspended Players</h3>
                          {sus.map(p => (
                            <p key={p.id} className="text-red-300 text-sm">{p.name} - {p.suspendedUntil} match{p.suspendedUntil !== 1 ? 'es' : ''} remaining</p>
                          ))}
                        </div>
                      );
                    })()}
                    
                  <div className="bg-gray-800 rounded-lg p-4 mb-4">
                    <h3 className="text-white font-bold mb-2">Formation: {formation}</h3>
                    <p className="text-gray-400 text-sm mb-3">{validXI ? '✅ Starting XI selected' : `⚠️ Select ${11 - selectedCount} more player${11 - selectedCount !== 1 ? 's' : ''}`}</p>
                    <button onClick={() => { setPage('starting-xi'); setState('info-page'); }} className="w-full bg-orange-600 text-white py-3 rounded-lg font-semibold hover:bg-orange-700">Edit Starting XI</button>
                  </div>
                  <button onClick={playMatch} disabled={!validXI} className={`w-full py-4 rounded-lg font-bold text-xl ${validXI ? 'bg-green-600 text-white hover:bg-green-700' : 'bg-gray-700 text-gray-500 cursor-not-allowed'}`}>{validXI ? 'Start Match' : 'Select Starting XI First'}</button>
                </div>
              </div>
            );
          }

          return null;
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
